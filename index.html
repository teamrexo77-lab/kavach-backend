<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVACH V2 - Anonymous Student Reporting Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #dc2626; /* റെഡ് കളർ തീം - ലഹരിക്കെതിരെ */
            --accent-hover: #991b1b;
            --card-bg: rgba(255, 255, 255, 0.95); /* ലൈറ്റ് ട്രാൻസ്പാരന്റ് കാർഡ് */
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Poppins', 'Manjari', sans-serif;
            /* ലഹരിക്കെതിരെയുള്ള പ്രൊഫഷണൽ ബാക്ക്ഗ്രൗണ്ട് ഇമേജ് */
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1617886903355-9354be57756f?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
        }

        /* Anti-Drug Banner */
        .drug-banner {
            background: #000000;
            color: #ff3333;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            border-bottom: 1px solid #330000;
        }

        /* Header Style */
        .header {
            background: #0f172a;
            padding: 25px 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }

        .logo-shield {
            font-size: 38px;
            margin-bottom: 5px;
        }

        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header .version {
            background: var(--accent);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
            margin-left: 5px;
        }

        .header p {
            color: #94a3b8;
            margin: 5px 0 0 0;
            font-size: 13px;
            font-weight: 600;
        }

        /* Form Style */
        .form-body {
            padding: 25px 20px;
        }

        .status-badge {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--primary);
        }

        select, textarea {
            width: 100%;
            padding: 13px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #ffffff;
            color: var(--text-main);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
        }

        textarea {
            height: 110px;
            resize: vertical;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(220, 38, 38, 0.4);
        }

        /* Privacy Footer */
        .privacy-note {
            background: #f8fafc;
            border-radius: 12px;
            padding: 10px;
            margin-top: 15px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
            border: 1px dashed var(--border-color);
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="drug-banner">
        ⚠️ SAY NO TO DRUGS / ലഹരിക്കെതിരെ ഒരു കവചം
    </div>

    <div class="header">
        <div class="logo-shield">🛡️</div>
        <h1>KAVACH <span class="version">V2.0</span></h1>
        <p>Anonymous Student Reporting Portal</p>
    </div>

    <div class="form-body">
        <div class="status-badge">
            🔒 SECURE TUNNEL ACTIVE [IP & EXIF STRIPPED]
        </div>

        <form id="complaintForm">
            <div class="field-group">
                <label for="districtSelect">
                    Select District / ജില്ല തിരഞ്ഞെടുക്കുക
                </label>
                <select id="districtSelect" onchange="updateSchools()" required>
                    <option value="">-- Select District / ജില്ല തിരഞ്ഞെടുക്കുക --</option>
                    <option value="Thiruvananthapuram">തിരുവനന്തപുരം (Thiruvananthapuram)</option>
                    <option value="Kollam">കൊല്ലം (Kollam)</option>
                    <option value="Pathanamthitta">പത്തനംതിട്ട (Pathanamthitta)</option>
                    <option value="Alappuzha">ആലപ്പുഴ (Alappuzha)</option>
                    <option value="Kottayam">കൊട്ടയം (Kottayam)</option>
                    <option value="Idukki">ഇടുക്കി (Idukki)</option>
                    <option value="Ernakulam">എറണാകുളം (Ernakulam)</option>
                    <option value="Thrissur">തൃശ്ശൂർ (Thrissur)</option>
                    <option value="Palakkad">പാലക്കാട് (Palakkad)</option>
                    <option value="Malappuram">മലപ്പുറം (Malappuram)</option>
                    <option value="Kozhikode">കോഴിക്കോട് (Kozhikode)</option>
                    <option value="Wayanad">വയനാട് (Wayanad)</option>
                    <option value="Kannur">കണ്ണൂർ (Kannur)</option>
                    <option value="Kasaragod">കാസർഗോഡ് (Kasaragod)</option>
                </select>
            </div>

            <div class="field-group">
                <label for="schoolSelect">
                    Select Educational Institution / സ്കൂൾ തിരഞ്ഞെടുക്കുക
                </label>
                <select id="schoolSelect" required disabled>
                    <option value="">-- First Select District / ആദ്യം ജില്ല തിരഞ്ഞെടുക്കുക --</option>
                </select>
            </div>

            <div class="field-group">
                <label for="complaintInput">
                    Actionable Complaint Details / പരാതി വിശദമായി എഴുതുക
                </label>
                <textarea id="complaintInput" placeholder="ലഹരി ഉപയോഗം അല്ലെങ്കിൽ വിതരണവുമായി ബന്ധപ്പെട്ട വിവരങ്ങൾ ഇവിടെ രേഖപ്പെടുത്താം. നിങ്ങളുടെ പേരോ മറ്റ് വിവരങ്ങളോ എഴുതരുത്..." required></textarea>
            </div>

            <button type="button" class="btn-submit" onclick="submitComplaint()">
                🔒 Transmit Securely / രഹസ്യമായി സമർപ്പിക്കുക
            </button>
        </form>

        <div class="privacy-note">
            ഈ പോർട്ടൽ നിങ്ങളുടെ വിവരങ്ങൾ ഒന്നും ശേഖരിക്കുന്നില്ല. പൂർണ്ണ സുരക്ഷിതത്വത്തോടെ നിങ്ങൾക്ക് വിവരങ്ങൾ കൈമാറാം.
        </div>
    </div>
</div>

<script>
// 14 ജില്ലകളിലെ മാതൃകാ സ്കൂളുകളുടെ ഡാറ്റ
const schoolData = {
    "Thiruvananthapuram": ["SMV Govt Model HSS TVM", "Govt Model HSS Thycaut", "Cotton Hill Govt Girls HSS"],
    "Kollam": ["Govt Model HSS Kollam", "St. Aloysius HSS Kollam", "TKM HSS Karikode"],
    "Pathanamthitta": ["Govt HSS Pathanamthitta", "Marthoma HSS Thiruvalla", "SNDP HSS Chenneerkara"],
    "Alappuzha": ["Govt Mohammedans HSS Alappuzha", "Leo XIII HSS Alappuzha", "Govt HSS Alappuzha"],
    "Kottayam": ["Govt Model HSS Kottayam", "MD Seminary HSS Kottayam", "CMS College HSS Kottayam"],
    "Idukki": ["Govt HSS Thodupuzha", "St. George HSS Kattappana", "Govt HSS Munnar"],
    "Ernakulam": ["Govt Model HSS Ernakulam", "St. Alberts HSS Ernakulam", "SRV Govt HSS Ernakulam"],
    "Thrissur": ["Govt Model HSS Thrissur", "St. Thomas HSS Thrissur", "CMS HSS Thrissur"],
    "Palakkad": ["Govt Victoria Girls HSS Palakkad", "PMG HSS Palakkad", "Govt HSS Cherpulassery"],
    "Malappuram": ["Govt Boys HSS Malappuram", "MSP HSS Malappuram", "Govt HSS Tirurangadi"],
    "Kozhikode": ["Govt Model HSS Kozhikode", "St. Josephs Boys HSS Kozhikode", "Silver Hills HSS Kozhikode"],
    "Wayanad": ["Govt HSS Kalpetta", "St. Marys HSS Sultan Bathery", "Govt HSS Mananthavady"],
    "Kannur": ["Govt Model HSS Kannur", "St. Michaels HSS Kannur", "Govt HSS Cherukunnu"],
    "Kasaragod": ["Govt HSS Kasaragod", "BEM HSS Kasaragod", "Govt HSS Kanhangad"]
};

function updateSchools() {
    const districtSelect = document.getElementById("districtSelect");
    const schoolSelect = document.getElementById("schoolSelect");
    const selectedDistrict = districtSelect.value;

    schoolSelect.innerHTML = '<option value="">-- Select School / സ്കൂൾ തിരഞ്ഞെടുക്കുക --</option>';

    if (selectedDistrict && schoolData[selectedDistrict]) {
        schoolSelect.disabled = false;
        schoolData[selectedDistrict].forEach(function(school) {
            const option = document.createElement("option");
            option.value = school;
            option.textContent = school;
            schoolSelect.appendChild(option);
        });
    } else {
        schoolSelect.disabled = true;
        schoolSelect.innerHTML = '<option value="">-- First Select District / ആദ്യം ജില്ല തിരഞ്ഞെടുക്കുക --</option>';
    }
}

function submitComplaint() {
    const districtName = document.getElementById("districtSelect").value;
    const schoolName = document.getElementById("schoolSelect").value;
    const complaintText = document.getElementById("complaintInput").value;

    if (!districtName || !schoolName || !complaintText) {
        alert("ദയവായി എല്ലാ വിവരങ്ങളും പൂരിപ്പിക്കുക!");
        return;
    }

    const SERVER_URL = "https://kavach-server-5kum.onrender.com/api/report"; 

    const data = {
        school: `${schoolName} (${districtName} District)`,
        complaint: complaintText
    };

    fetch(SERVER_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if(result.success) {
            alert(result.message); 
            document.getElementById("complaintForm").reset();
            document.getElementById("schoolSelect").disabled = true;
            document.getElementById("schoolSelect").innerHTML = '<option value="">-- First Select District / ആദ്യം ജില്ല തിരഞ്ഞെടുക്കുക --</option>';
        } else {
            alert("Error: " + result.message);
        }
    })
    .catch(error => {
        console.error("Error:", error);
        alert("സെർവറുമായി ബന്ധപ്പെടാൻ സാധിച്ചില്ല! അല്പസമയത്തിന് ശേഷം വീണ്ടും ശ്രമിക്കുക.");
    });
}
</script>

</body>
</html>
